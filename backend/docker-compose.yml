version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: skillforge-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: skillforge
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - skillforge-network

  skillforge-backend:
    build: .
    container_name: skillforge-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://admin:password@mongodb:27017/skillforge?authSource=admin
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - mongodb
    networks:
      - skillforge-network

volumes:
  mongodb_data:

networks:
  skillforge-network:
    driver: bridge