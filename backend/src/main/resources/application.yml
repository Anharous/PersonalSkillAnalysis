server:
  port: 8080
  servlet:
    context-path: /api

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/skillforge
      database: skillforge
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: mySecretKey
  expiration: 86400000 # 24 hours

openai:
  api-key: ${OPENAI_API_KEY:your-openai-api-key}

logging:
  level:
    com.skillforge: DEBUG
    org.springframework.data.mongodb: DEBUG